<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeVault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Digital Asset Manager</h1>

    <div class="controls">
        <button onclick="fetchAll()">View All Assets</button>
        <button onclick="fetchFirst()">First Record</button>
        <button onclick="fetchLast()">Last Record</button>
        <button onclick="fetchTotalValue()">Total Value by Owner</button>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by asset name">
        <button onclick="searchAssets()">Search</button>
    </div>

    <div class="form-section">
        <h2>Insert Asset</h2>
        <input type="number" id="ins_id" placeholder="Asset ID">
        <input type="text" id="ins_name" placeholder="Asset Name">
        <input type="text" id="ins_type" placeholder="Asset Type">
        <input type="text" id="ins_desc" placeholder="Description">
        <input type="number" id="ins_owner" placeholder="Owner ID">
        <button onclick="insertAsset()">Insert</button>
    </div>

    <div class="form-section">
        <h2>Update Asset Name</h2>
        <input type="number" id="upd_id" placeholder="Asset ID">
        <input type="text" id="upd_name" placeholder="New Asset Name">
        <button onclick="updateAsset()">Update</button>
    </div>

    <div class="form-section">
        <h2>Delete Asset</h2>
        <input type="number" id="del_id" placeholder="Asset ID">
        <button onclick="deleteAsset()">Delete</button>
    </div>

    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
